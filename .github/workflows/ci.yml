name: CI — syntax + smoke tests
on:
  push:
    branches: [master]
    paths-ignore:
      - 'STATUS.md'
      - '*.md'
      - '.gitignore'
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax:
    name: Syntax check (node --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: node --check on frontend JS
        run: |
          set -e
          for f in src/js/*.js; do
            echo "checking $f"
            node --check "$f"
          done
      - name: node --check on Worker JS
        run: |
          set -e
          for f in $(find worker/src -maxdepth 2 -type f \( -name '*.js' -o -name '*.mjs' \)); do
            echo "checking $f"
            node --check "$f"
          done

      - name: Unit tests + coverage
        run: |
          set -e
          if [ -d worker/test ]; then
            for f in $(find worker/test -type f -name '*.test.mjs'); do
              echo "running $f"
              node --test --experimental-test-coverage --test-reporter=spec "$f" 2>&1 | tee test-out.log
            done
            # Extract coverage % (rough) for summary badge — Node --test-coverage
            # prints "coverage" lines we can grep. Best-effort — don't fail the
            # build if the format changes.
            if grep -qE 'all files' test-out.log; then
              echo "## Test coverage" >> "$GITHUB_STEP_SUMMARY"
              grep -A1 'all files' test-out.log | tail -1 >> "$GITHUB_STEP_SUMMARY" || true
            fi
          fi

  playwright:
    name: Playwright smoke (22-URL sweep)
    runs-on: ubuntu-latest
    needs: syntax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run sweep against production
        # Sweep hits the live site (maale-amos.github.io) — so this catches
        # broken deploys within a minute of merge. The Cloudflare Worker
        # requests are filtered inside the script (workers.dev is blocked
        # from CI here too in some cases).
        run: node scripts/full-sweep.mjs
