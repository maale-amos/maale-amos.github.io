<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — דף לא נמצא | מעלה עמוס</title>
<link rel="icon" href="images/logo.jpg" type="image/jpeg">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root { --primary: #1a5c3a; --accent: #c8960c; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Heebo', sans-serif;
  background: linear-gradient(135deg, #f5f0e6 0%, #e8f4f8 100%);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px; color: #2c3e50;
}
.box {
  background: #fff;
  border-radius: 24px;
  padding: 48px 32px;
  box-shadow: 0 12px 40px rgba(0,0,0,.1);
  text-align: center;
  max-width: 460px; width: 100%;
}
.logo {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--primary); color: var(--accent);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 2.4rem; font-weight: 800;
  margin-bottom: 20px;
  font-family: 'Times New Roman', serif;
}
h1 { font-size: 5rem; color: var(--primary); margin-bottom: 8px; font-weight: 800; }
h2 { font-size: 1.4rem; margin-bottom: 12px; font-weight: 600; }
p { color: #6c757d; margin-bottom: 28px; line-height: 1.6; }
.btn {
  display: inline-block; background: var(--primary); color: #fff;
  padding: 14px 32px; border-radius: 14px; text-decoration: none;
  font-weight: 700; font-size: 1.05rem;
  transition: all .25s ease;
  box-shadow: 0 4px 12px rgba(26,92,58,.3);
}
.btn:hover { background: #2d8a5e; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(26,92,58,.4); }
</style>
</head>
<body>
<div class="box">
  <div class="logo">מ"ע</div>
  <h1>404</h1>
  <h2>הדף לא נמצא</h2>
  <p>נראה שהקישור שלחצת עליו לא קיים או נמחק.<br>בוא נחזור לעמוד הבית.</p>
  <a href="/" class="btn">לעמוד הבית של מעלה עמוס</a>
</div>
</body>
</html>
